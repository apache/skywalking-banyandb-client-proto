syntax = "proto3";

option java_package = "org.apache.skywalking.banyandb.bydbql.v1";

package banyandb.bydbql.v1;

import "validate/validate.proto";
import "banyandb/v1/banyandb-measure.proto";
import "banyandb/v1/banyandb-model.proto";
import "banyandb/v1/banyandb-property.proto";
import "banyandb/v1/banyandb-stream.proto";
import "banyandb/v1/banyandb-trace.proto";

// QueryRequest is the main request message for BydbQL queries
message QueryRequest {
  // query is the BydbQL query string
  string query = 1 [(validate.rules).string.min_len = 1];
  // params are bound to the `?` placeholders in the query string by their order of appearance.
  // The number of params must match the number of placeholders.
  // Accepted variants depend on the placeholder's position: str/timestamp for TIME values,
  // str/int/null for scalar comparisons, str/int/null/str_array/int_array for IN/MATCH/HAVING
  // value lists (arrays expand in place), and int for LIMIT/OFFSET/TOP N counts.
  // binary_data is rejected everywhere.
  repeated model.v1.TagValue params = 2;
}

// QueryResponse contains the result of a BydbQL query
message QueryResponse {
  // result contains the actual query result based on the query type
  oneof result {
    // stream_result is returned for stream queries
    stream.v1.QueryResponse stream_result = 1;
    // measure_result is returned for measure queries
    measure.v1.QueryResponse measure_result = 2;
    // property_result is returned for property queries
    property.v1.QueryResponse property_result = 3;
    // trace_result is returned for trace queries
    trace.v1.QueryResponse trace_result = 4;
    // topn_result is returned for TopN queries
    measure.v1.TopNResponse topn_result = 5;
  }
}

// BydbQLService provides query interface for BanyanDB Query Language (BydbQL)
service BydbQLService {
  // Query executes a generic BydbQL query with explicit FROM clause
  // This endpoint requires the query to specify the resource type and name
  // in the FROM clause (e.g., "FROM STREAM sw", "FROM MEASURE metrics")
  rpc Query(QueryRequest) returns (QueryResponse);
}
